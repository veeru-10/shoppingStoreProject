<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛒shoppingStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">

  <!-- Favicons -->
  <link rel="apple-touch-icon" sizes="180x180" href="./favicons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="./favicons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./favicons/favicon-16x16.png">
  <link rel="icon" type="image/x-icon" href="./favicons/favicon.ico">
  <link rel="manifest" href="./favicons/manifest.json">
  <meta name="msapplication-config" content="./favicons/browserconfig.xml">
  <meta name="theme-color" content="#000000">
</head>
<body class="bg-dark text-light">
  <header class="sticky-top">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-3">
      <div class="container-fluid">
        <a class="navbar-brand text-danger fs-5 me-auto" href="#">🛒 ShoppingStore</a>
        
        <form class="d-flex gap-2 order-lg-2 me-3" role="search">
          <input id="search" class="form-control form-control-sm bg-dark text-light" type="search" placeholder="Search" aria-label="Search"/>
          <button class="btn btn-outline-success btn-sm" type="submit">Search</button>
        </form>
        
        <button class="navbar-toggler d-lg-none order-lg-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas" aria-controls="filterOffcanvas">
          <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="offcanvas offcanvas-start d-lg-none bg-dark" tabindex="-1" id="filterOffcanvas" aria-labelledby="filterOffcanvasLabel">
          <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-light" id="filterOffcanvasLabel">Filters</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
          </div>
          <div class="offcanvas-body p-0">
            <fieldset class="p-3">
              <legend class="text-secondary">Category</legend>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="category" id="all" value="all">
                <label class="form-check-label" for="all">All</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="category" id="men" value="men's clothing">
                <label class="form-check-label" for="men">Men</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="category" id="women" value="women's clothing">
                <label class="form-check-label" for="women">Women</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="category" id="jewelery" value="jewelery">
                <label class="form-check-label" for="jewelery">Jewelery</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="category" id="electronics" value="electronics">
                <label class="form-check-label" for="electronics">Electronics</label>
              </div>
            </fieldset>
            <fieldset class="p-3">
              <legend class="text-secondary">Prices</legend>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="price" id="all" value="all" data-min="-1">
                <label class="form-check-label" for="all">all</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="price" id="0-100" data-min="0" data-max="100">
                <label class="form-check-label" for="0-100">upto 100</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="price" id="100-500" data-min="100" data-max="500">
                <label class="form-check-label" for="100-500">upto 500</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="price" id="500-1000" data-min="500" data-max="1000">
                <label class="form-check-label" for="500-1000">upto 1000</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="price" id="1000-10000" data-min="1000" data-max="10000">
                <label class="form-check-label" for="1000-10000">1000+</label>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
    </nav>
  </header>
  <main>
    <section class="left-section shadow-lg d-none d-lg-flex flex-column gap-2 justify-content-start align-items-center py-4 px-2">
      <fieldset class="p-3">
        <legend class="text-secondary">Category</legend>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" id="all" value="all">
          <label class="form-check-label" for="all">All</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" id="men" value="men's clothing">
          <label class="form-check-label" for="men">Men</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" id="women" value="women's clothing">
          <label class="form-check-label" for="women">Women</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" id="jewelery" value="jewelery">
          <label class="form-check-label" for="jewelery">Jewelery</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="category" id="electronics" value="electronics">
          <label class="form-check-label" for="electronics">Electronics</label>
        </div>
      </fieldset>
      <fieldset class="p-3">
        <legend class="text-secondary">Prices</legend>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="price" id="all" value="all" data-min="-1">
          <label class="form-check-label" for="all">all</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="price" id="0-100" value="0-100" data-min="0" data-max="100">
          <label class="form-check-label" for="0-100">upto 100</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="price" id="100-500" value="100-500" data-min="100" data-max="500">
          <label class="form-check-label" for="100-500">upto 500</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="price" id="500-1000" value="500-1000" data-min="500" data-max="1000">
          <label class="form-check-label" for="500-1000">upto 1000</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="price" id="1000-10000" value="1000-10000" data-min="1000" data-max="10000">
          <label class="form-check-label" for="1000-10000">1000+</label>
        </div>
      </fieldset>
    </section>
    <section id="right-section" class="py-4 px-2">
      <div class="row" id="row1">
      <div class="row" id="row2">
      </div>
    </section>
  </main>
  <footer class="footer bg-dark border-top border-secondary py-4 mt-5">
    <div class="container-fluid">
      <div class="row text-center">
        <div class="col-md-4 mb-3 mb-md-0">
          <p class="mb-1 text-secondary small">Email</p>
          <a href="mailto:Veeranjinvemala@gmail.com" class="link-danger text-decoration-none">Veeranjinvemala@gmail.com</a>
        </div>
        <div class="col-md-4">
          <p class="text-center text-secondary small">© 2026 ShoppingStore. All rights reserved.</p>
        </div>
        <div class="col-md-4 mb-3 mb-md-0">
          <p class="mb-1 text-secondary small">Phone</p>
          <a href="tel:+918919086876" class="link-light text-decoration-none">+91 8919086876</a>
        </div>
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script src="./products.js"></script>
</body>
</html>
